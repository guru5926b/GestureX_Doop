<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>HandGPT — Phone Pad</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--text:#c9d1d9;--text2:#8b949e;--green:#3fb950;--blue:#58a6ff;--purple:#bc8cff;--orange:#f0883e;--yellow:#d29922;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;max-width:480px;margin:0 auto;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
header h1{font-size:14px;color:var(--purple);font-weight:700;}
#status-dot{width:8px;height:8px;border-radius:50%;background:var(--yellow);margin-left:auto;}
#status-txt{font-size:10px;color:var(--yellow);}
.last-sent{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
#last-label{font-size:36px;font-weight:900;color:var(--green);min-width:50px;text-align:center;}
#last-label.pop{animation:pop .3s ease;}
@keyframes pop{0%{transform:scale(.7);opacity:0}70%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
.last-meta{flex:1;}
#last-name{font-size:12px;color:var(--text2);margin-bottom:2px;}
#last-time{font-size:10px;color:var(--border);}
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:9px;text-align:center;font-size:12px;font-weight:600;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;transition:color .2s,border-color .2s;}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);}
.pad-wrap{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px;}
.section-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text2);padding:2px 0 4px;font-weight:600;}
.btn-grid{display:grid;gap:8px;}
.btn-grid.cols5{grid-template-columns:repeat(5,1fr);}
.gBtn{background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:18px;font-weight:800;padding:14px 8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:background .1s,border-color .1s,transform .1s;-webkit-user-select:none;user-select:none;position:relative;overflow:hidden;}
.gBtn .sub{font-size:8px;font-weight:400;color:var(--text2);letter-spacing:.5px;}
.gBtn.num{border-color:#1a2535;}
.gBtn.let{border-color:#1e1a28;}
.gBtn.num:active,.gBtn.num.pressed{border-color:var(--blue);background:#0d1f33;transform:scale(.93);}
.gBtn.let:active,.gBtn.let.pressed{border-color:var(--purple);background:#1a1228;transform:scale(.93);}
.gBtn.special{background:linear-gradient(135deg,#1a2e1a,#162316);border-color:var(--green);color:var(--green);}
.gBtn.special:active{transform:scale(.93);}
.ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);animation:rpl .5s linear;pointer-events:none;}
@keyframes rpl{to{transform:scale(4);opacity:0}}
.panel{display:none;}
.panel.active{display:flex;flex-direction:column;gap:8px;}
.log-wrap{flex:1;overflow-y:auto;padding:12px;}
.log-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;background:var(--surface);border:1px solid var(--border);margin-bottom:6px;font-size:12px;}
.log-lbl{font-size:18px;font-weight:800;color:var(--green);min-width:30px;}
.log-time{font-size:10px;color:var(--text2);margin-left:auto;}
#fb-warn{font-size:11px;color:var(--yellow);padding:8px 12px;background:#1a1600;border-radius:6px;border:1px solid var(--yellow);display:none;}
</style>
</head>
<body>
<header>
  <span style="font-size:16px">📱</span>
  <h1>HandGPT Phone Pad</h1>
  <div id="status-dot"></div>
  <span id="status-txt">Connecting...</span>
</header>
<div class="last-sent">
  <div id="last-label">—</div>
  <div class="last-meta">
    <div id="last-name">No gesture sent yet</div>
    <div id="last-time">Tap a button below</div>
  </div>
</div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('numbers',this)">0–9</button>
  <button class="tab" onclick="switchTab('letters',this)">A–J</button>
  <button class="tab" onclick="switchTab('log',this)">Log</button>
</div>

<div class="pad-wrap panel active" id="panel-numbers">
  <div id="fb-warn">⚠️ Firebase not configured — gestures won't reach the dashboard on another device. Paste your config in both HTML files.</div>
  <div class="section-label">Number Gestures</div>
  <div class="btn-grid cols5" id="num-grid"></div>
  <button class="gBtn special" onclick="doSend(event,this,'HI','Wave Hi')">👋<span class="sub">WAVE HI</span></button>
</div>

<div class="pad-wrap panel" id="panel-letters">
  <div class="section-label">Letter Gestures (A–J)</div>
  <div class="btn-grid cols5" id="let-grid"></div>
</div>

<div class="log-wrap panel" id="panel-log">
  <div id="log-list"><div style="font-size:11px;color:var(--text2);padding:10px 0;">No gestures sent yet.</div></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

// ═══════════════════════════════════════════════
// PASTE YOUR FIREBASE CONFIG HERE (both files!)
// ═══════════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyA5aabIknYuPFNOJXdWe1TwureuSESqV9M",
    authDomain: "gesturex-a4cdb.firebaseapp.com",
    projectId: "gesturex-a4cdb",
    storageBucket: "gesturex-a4cdb.firebasestorage.app",
    messagingSenderId: "480395168192",
    appId: "1:480395168192:web:06aeb5acdafb67b2262025",
    measurementId: "G-VM8K6RED7J"
  };
// ═══════════════════════════════════════════════

const NUM_NAMES={'0':'Zero','1':'One','2':'Two','3':'Three','4':'Four','5':'Five','6':'Six','7':'Seven','8':'Eight','9':'Nine'};
const LET_NAMES={'A':'Fist','B':'Four fingers','C':'Curved','D':'D-shape','E':'Claw','F':'F-shape','G':'Point right','H':'Point out','I':'Pinky up','J':'J-hook'};

const configured = firebaseConfig.apiKey !== "YOUR_API_KEY";
let db=null, gestureRef=null, sendLog=[];

const dot=document.getElementById('status-dot');
const txt=document.getElementById('status-txt');

if(!configured){
  dot.style.background='var(--yellow)';
  txt.style.color='var(--yellow)';
  txt.textContent='No Firebase';
  document.getElementById('fb-warn').style.display='block';
} else {
  try{
    const app=initializeApp(firebaseConfig);
    db=getDatabase(app);
    gestureRef=ref(db,'handgpt/gesture');
    dot.style.background='var(--green)';
    dot.style.boxShadow='0 0 8px var(--green)';
    txt.style.color='var(--green)';
    txt.textContent='Live';
  }catch(e){
    dot.style.background='var(--red)';
    txt.textContent='Error';
    console.error(e);
  }
}

// Build grids
const ng=document.getElementById('num-grid');
for(let i=0;i<=9;i++){
  const b=document.createElement('button');
  b.className='gBtn num';
  b.innerHTML=`${i}<span class="sub">${NUM_NAMES[String(i)]}</span>`;
  b.onclick=e=>doSend(e,b,String(i),NUM_NAMES[String(i)]);
  ng.appendChild(b);
}
const lg=document.getElementById('let-grid');
'ABCDEFGHIJ'.split('').forEach(l=>{
  const b=document.createElement('button');
  b.className='gBtn let';
  b.innerHTML=`${l}<span class="sub">${LET_NAMES[l]}</span>`;
  b.onclick=e=>doSend(e,b,l,LET_NAMES[l]);
  lg.appendChild(b);
});

window.doSend=function(e,btn,label,name){
  // Ripple
  const r=document.createElement('span');
  r.className='ripple';
  const rect=btn.getBoundingClientRect(),size=Math.max(rect.width,rect.height);
  r.style.cssText=`width:${size}px;height:${size}px;left:${(e.clientX||rect.left+rect.width/2)-rect.left-size/2}px;top:${(e.clientY||rect.top+rect.height/2)-rect.top-size/2}px`;
  btn.appendChild(r);setTimeout(()=>r.remove(),600);
  btn.classList.add('pressed');setTimeout(()=>btn.classList.remove('pressed'),200);

  // Firebase write
  if(db&&gestureRef){
    set(gestureRef,{label,name,t:Date.now()}).catch(console.error);
  }

  // Update last sent
  const el=document.getElementById('last-label');
  el.classList.remove('pop');void el.offsetWidth;
  el.textContent=label;el.classList.add('pop');
  document.getElementById('last-name').textContent=name;
  document.getElementById('last-time').textContent='Sent at '+new Date().toLocaleTimeString();

  // Flash status
  dot.style.background='var(--blue)';dot.style.boxShadow='0 0 10px var(--blue)';
  txt.style.color='var(--blue)';txt.textContent='Sent!';
  setTimeout(()=>{
    if(configured){dot.style.background='var(--green)';dot.style.boxShadow='0 0 8px var(--green)';txt.style.color='var(--green)';txt.textContent='Live';}
    else{dot.style.background='var(--yellow)';dot.style.boxShadow='none';txt.style.color='var(--yellow)';txt.textContent='No Firebase';}
  },800);

  // Log
  sendLog.unshift({label,name,time:new Date().toLocaleTimeString()});
  if(sendLog.length>50)sendLog.pop();
  const list=document.getElementById('log-list');
  list.innerHTML=sendLog.map(e=>`
    <div class="log-item">
      <div class="log-lbl">${e.label}</div>
      <div><div style="color:var(--text)">${e.name}</div><div style="font-size:10px;color:var(--text2)">Gesture sent</div></div>
      <div class="log-time">${e.time}</div>
    </div>`).join('');
};

window.switchTab=function(name,tabEl){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
};
</script>
</body>
</html>
